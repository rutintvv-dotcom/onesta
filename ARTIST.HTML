<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onesta Artist Identity</title>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Helvetica', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100vh;
            overflow: hidden;
            transition: background 1.2s ease-in-out; /* 배경 전환을 더 부드럽게 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 하단 그라데이션 */
        .overlay {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 0;
            pointer-events: none;
        }

        /* 중앙에 스며들듯 나타날 링크 영역 */
        #link-overlay {
            position: fixed;
            top: 45%; /* 칩보다 약간 위에 위치 */
            left: 30%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            z-index: 5;
            opacity: 0;
            transition: opacity 1.5s ease-in-out; /* 스며드는 효과의 핵심 */
            pointer-events: none;
        }

        #link-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

/* 반짝임 효과 정의 */
@keyframes gentle-glow {
    0%, 100% {
        opacity: 0.7; /* 가장 흐릴 때 */
        filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        transform: translate(-50%, -50%) scale(1);
    }
    50% {
        opacity: 1; /* 가장 밝을 때 */
        filter: drop-shadow(0 0 20px rgba(255,255,255,0.6));
        transform: translate(-50%, -50%) scale(1.02); /* 미세하게 커짐 */
    }
}

        .vapor-link {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            letter-spacing: 5px;
            font-weight: 200;
            transition: all 0.5s ease;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .vapor-link:hover {
            color: rgba(255, 255, 255, 1);
            letter-spacing: 8px; /* 호버 시 약간 벌어지는 시각 효과 */
        }

        h2 { margin-bottom: 30px; font-weight: 200; letter-spacing: 5px; z-index: 1; text-align: center; font-size: 1rem; }

        .palette-container {
            display: flex;
            gap: 15px;
            z-index: 1;
            margin-bottom: 40px;
            flex-wrap: nowrap;
            justify-content: center;
        }

        .pantone-chip {
            width: 120px;
            height: 180px;
            background: #fff;
            padding: 8px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .pantone-chip:hover { transform: translateY(-10px); }

        .color-area { width: 100%; height: 75%; background-size: cover; background-position: center; }

        /* 칩 내부 이미지 */
        .color-1 { background-image: url('kim.jpg'); }
        .color-2 { background-image: url('yum.jpg'); }
        .color-3 { background-image: url('in.jpg'); }
        .color-4 { background-image: url('song.jpg'); }

        .text-area { padding-top: 10px; color: #000; font-size: 10px; font-weight: bold; line-height: 1.2; text-align: center; }

        @media (max-width: 600px) {
            .pantone-chip { width: 75px; height: 120px; }
            .vapor-link { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="link-overlay">
        <a href="#" id="link-site" class="vapor-link" target="_blank">YOUTUBE SITE</a>
        <a href="#" id="link-sns" class="vapor-link" target="_blank">INSTAGRAM</a>
    </div>

    <div class="overlay"></div>
    
    <h2>ARTISTS WITH ONESTARCOMPANY</h2>

    <div class="palette-container">
        <div class="pantone-chip" onclick="updateArtist('kim.jpg', 'center 20%', 'https://www.youtube.com/channel/UCaSrhmpHAzOhBcsdVk3FoEg', 'https://www.instagram.com/lovebin_i')">
            <div class="color-area color-1"></div>
            <div class="text-area">Yong Bin Kim</div>
        </div>
        <div class="pantone-chip" onclick="updateArtist('yum.jpg', 'center 35%', 'https://www.youtube.com/channel/UCkAqcF3RgmTVPzZsOmiXQyQ', 'https://www.instagram.com/glass.yy')">
            <div class="color-area color-2"></div>
            <div class="text-area">Yuri Yeom</div>
        </div>
        <div class="pantone-chip" onclick="updateArtist('in.jpg', 'center 30%', 'https://www.youtube.com/channel/UCaHNvWWYrQvWdwpp5z9pP-Q', 'https://www.instagram.com/kuyhni_')">
            <div class="color-area color-3"></div>
            <div class="text-area">In Hyeok Hwang</div>
        </div>
        <div class="pantone-chip" onclick="updateArtist('song.jpg', 'center 35%', 'https://www.youtube.com/@song3226', 'https://www.instagram.com/songja0u0?igsh=MWppZXcwdXY2aHB6aQ==')">
            <div class="color-area color-4"></div>
            <div class="text-area">Ja Young Song</div>
        </div>
    </div>

    <script>
        function updateArtist(imgUrl, pos, siteUrl, snsUrl) {
            const overlay = document.getElementById('link-overlay');
            
            // 1. 기존 링크 서서히 숨기기
            overlay.classList.remove('visible');

            setTimeout(() => {
                // 2. 배경 변경
                document.body.style.backgroundImage = "url('" + imgUrl + "')";
                document.body.style.backgroundPosition = pos;

                // 3. 링크 주소 교체
                document.getElementById('link-site').href = siteUrl;
                document.getElementById('link-sns').href = snsUrl;

                // 4. 새 링크 서서히 나타나기
                overlay.classList.add('visible');
            }, 500); // 0.5초 뒤에 실행하여 부드러운 전환 유도
        }

        // 초기 화면 설정
        window.onload = () => updateArtist('kim.jpg', 'center 20%', 'https://kimsite.com', 'https://instagram.com/kim');
    </script>
</body>
</html>
