<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onesta Company | Official</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #fdfdfd;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Helvetica', sans-serif;
        }

        .paper-texture {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            opacity: 0.6; pointer-events: none; z-index: 1;
        }

        .ink-wrapper {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
            z-index: 2;
            filter: url(#ink-filter);
        }

        .ink-blob {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, 
                rgba(0, 0, 0, 0.5) 0%, 
                rgba(20, 20, 30, 0.25) 40%, 
                transparent 80%);
            opacity: 0;
        }

        /* 4군데 확산 애니메이션 */
        .blob-1 { top: 45%; left: 45%; animation: expand-up-left 10s cubic-bezier(0.2, 0.4, 0.4, 0.95) forwards; }
        .blob-2 { top: 50%; left: 50%; animation: expand-down 11s cubic-bezier(0.2, 0.4, 0.4, 0.95) 0.5s forwards; }
        .blob-3 { top: 48%; left: 52%; animation: expand-right 12s cubic-bezier(0.2, 0.4, 0.4, 0.95) 1.2s forwards; }
        
        /* blob-4: 왼쪽 위에서 추가로 번짐 (절반 크기) */
        .blob-4 { 
            top: 20%; left: 20%; 
            animation: expand-small 9s cubic-bezier(0.2, 0.4, 0.4, 0.95) 0.8s forwards; 
        }

        @keyframes expand-up-left {
            0% { width: 0; height: 0; opacity: 0; transform: translate(0, 0) scale(0.3); }
            30% { opacity: 0.7; }
            100% { width: 180vw; height: 180vw; opacity: 0.1; transform: translate(-20%, -20%) scale(1.5); }
        }

        @keyframes expand-down {
            0% { width: 0; height: 0; opacity: 0; transform: translate(0, 0) scale(0.3); }
            30% { opacity: 0.6; }
            100% { width: 200vw; height: 200vw; opacity: 0.08; transform: translate(0, 25%) scale(1.6); }
        }

        @keyframes expand-right {
            0% { width: 0; height: 0; opacity: 0; transform: translate(0, 0) scale(0.3); }
            30% { opacity: 0.5; }
            100% { width: 170vw; height: 170vw; opacity: 0.1; transform: translate(25%, 10%) scale(1.4); }
        }

        /* 왼쪽 위 작은 번짐 전용 애니메이션 */
        @keyframes expand-small {
            0% { width: 0; height: 0; opacity: 0; transform: scale(0.2); }
            30% { opacity: 0.4; }
            100% { width: 80vw; height: 80vw; opacity: 0.07; transform: scale(1); }
        }

        .brand-logo {
            position: relative;
            z-index: 10;
            text-decoration: none;
            color: #111;
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 1.5rem;
            text-transform: uppercase;
            opacity: 0;
            filter: blur(8px);
            transform: scale(0.8) translateZ(-150px);
            animation: text-zoom 6s ease-out 2s forwards;
            cursor: pointer;
            transition: all 0.6s ease;
        }

        .brand-logo:hover { letter-spacing: 1.8rem; color: #444; }

        @keyframes text-zoom {
            0% { opacity: 0; transform: scale(0.8); filter: blur(8px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .click-hint {
            position: absolute;
            bottom: 50px;
            font-size: 10px; color: #bbb; letter-spacing: 5px;
            opacity: 0; animation: fade-in 2s ease forwards 5s; z-index: 10;
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="ink-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="4" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="100" />
        </filter>
    </svg>

    <div class="paper-texture"></div>
    
    <div class="ink-wrapper">
        <div class="ink-blob blob-1"></div>
        <div class="ink-blob blob-2"></div>
        <div class="ink-blob blob-3"></div>
        <div class="ink-blob blob-4"></div>
    </div>

    <a href="artist.html" class="brand-logo">onestacompany</a>
    <div class="click-hint">CLICK TO DISCOVER</div>

</body>
</html>
